name: Weekly Review

on:
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: site
        run: npm ci
        if: ${{ hashFiles('site/package-lock.json') != '' }}
      - name: Run checks
        working-directory: site
        run: |
          npm run lint --if-present
          npm test --if-present
          npm run build --if-present
      - name: Create review issue placeholder
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Weekly review completed - ${date}`,
              body: [
                'Automated weekly checks completed.',
                '',
                'Next MVP step: connect this workflow to Claude Code Cloud or another scheduled AI reviewer for qualitative code review.'
              ].join('\n'),
              labels: ['weekly-review']
            });
